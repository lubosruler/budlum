name: Phase10 Workspace Lock Review

on:
  pull_request:
    branches: [main]
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'B.U.D/**'
      - 'BNS/**'
      - 'budlum-primitives/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lock-diff:
    name: Generate workspace lock diff (review artifact)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # 2026-07-16
        with:
          toolchain: '1.94.0'
      - name: Generate lockfile only for review
        run: |
          cp Cargo.lock /tmp/Cargo.lock.before
          cargo generate-lockfile
          git diff -- Cargo.lock > phase10-workspace-lock.diff
          cp /tmp/Cargo.lock.before Cargo.lock
      - name: Upload lock diff
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: phase10-workspace-lock-diff-${{ github.sha }}
          path: phase10-workspace-lock.diff
          if-no-files-found: error
