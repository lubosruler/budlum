name: CI

# Bu iş akışı, main dalına her push'ta VE her Pull Request'te otomatik
# çalışır. Amaç: kimsenin "derledim, testler geçti" demesine güvenmeden,
# GitHub'ın kendi sunucusunda tarafsız bir şekilde bunu doğrulamak.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Budlum reposunu "Budlum" klasörüne çek
      - name: Checkout Budlum
        uses: actions/checkout@v4
        with:
          path: Budlum

      # 2. BudZero reposunu "BudZKVM" adıyla, Budlum'un YANINA (sibling) çek
      #    Budlum'un Cargo.toml'u ../BudZKVM path bağımlılığı beklediği için
      #    bu isim ve konum birebir önemli.
      - name: Checkout BudZero (as sibling ../BudZKVM)
        uses: actions/checkout@v4
        with:
          repository: budlum-xyz/BudZero
          path: BudZKVM

      # 3. Rust toolchain'i kur (reponun beklediği sürüm)
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94.0"
          components: clippy

      # 4. protoc kur (build.rs bunu gerektiriyor)
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "29.x"

      # 5. Derleme önbelleği (her seferinde sıfırdan indirmesin, hızlansın)
      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: Budlum

      # 6. Gerçek derleme
      - name: cargo build
        working-directory: Budlum
        run: cargo build --release --verbose

      # 7. Gerçek testler — asıl doğrulama burada
      - name: cargo test
        working-directory: Budlum
        run: cargo test --lib --verbose

      # 8. Kod kalitesi kontrolü (opsiyonel ama projede süreklilik var)
      - name: cargo clippy
        working-directory: Budlum
        run: cargo clippy --all-targets -- -D warnings
        continue-on-error: true   # şimdilik sadece bilgi amaçlı, build'i düşürmesin
