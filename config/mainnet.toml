[network]
profile = "mainnet"
chain_id = 1
# ADIM3 section 3.1: file must exist; hash in docs/operations/PRODUCTION_RUNBOOK.md section 8.2
# Genesis block hash (placeholder ceremony set): 16a60f4883768590b79e4f2f4abbf10ff24d4d4815069f4d98909740152f668e
genesis_file = "./config/mainnet-genesis.json"

[node]
role = "validator"

[storage]
data_dir = "./data/mainnet/budlum.db"
snapshot_dir = "./data/mainnet/snapshots"
backup_dir = "./data/mainnet/backups"
backups_enabled = true
backup_interval_secs = 3600
backup_retention_count = 24

[p2p]
identity_file = "./secrets/mainnet-node-id.key"
# Populate during the signed Mainnet release ceremony.
bootnodes = []
dns_seeds = []
max_peers = 100
banned_peer_db = "./data/mainnet/banned-peers.json"
mdns_enabled = false

[rpc]
public_listener = "0.0.0.0:8545"
operator_listener = "127.0.0.1:8546"
trusted_proxies = []
enabled = true

[metrics]
listener = "0.0.0.0:9090"

[validator]
backend = "pkcs11"

[validator.signer]
backend = "pkcs11"

# Add a deployment-specific PKCS#11 section outside source control.
# Mainnet validators must expose Ed25519 plus BLS (`BUD_BLS_KEY`) and
# Dilithium/PQ (`BUD_PQ_KEY`) material through the token; Ed25519-only HSM
# backends fail closed at startup.
# [validator.signer.pkcs11]
# module_path = "/path/to/vendor-pkcs11.so"
# slot_id = 0
# token_pin_env = "BUDLUM_PKCS11_TOKEN_PIN"

[features]
governance = false
zkvm_contracts = false
pruning = false
