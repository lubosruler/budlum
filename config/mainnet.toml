[network]
profile = "mainnet"
chain_id = 1
# ADIM3 section 3.1: file must exist; hash in docs/operations/PRODUCTION_RUNBOOK.md section 8.2
# Genesis block hash (ARENA1 tokenomics mainnet, timestamp=0): 9bf07f9f9bda9bf1fba9f12e859e4184dd468c0138cd6327710284629c30df4f
genesis_file = "./config/mainnet-genesis.json"

[node]
role = "validator"

[storage]
data_dir = "./data/mainnet/budlum.db"
snapshot_dir = "./data/mainnet/snapshots"
backup_dir = "./data/mainnet/backups"
backups_enabled = true
backup_interval_secs = 3600
backup_retention_count = 24

[p2p]
identity_file = "./secrets/mainnet-node-id.key"
# Q7 dummy bootnodes (per user decision add_dummy, 2026-07-16)
# These are NOT real production peers — replace during MAINNET_GENESIS_CEREMONY
# with signed multiaddrs. Valid until ceremony, then MUST be replaced.
bootnodes = [
  "/ip4/203.0.113.10/tcp/4001/p2p/12D3KooWDummyBootstrap1Placeholder000000000001",
  "/ip4/203.0.113.11/tcp/4001/p2p/12D3KooWDummyBootstrap2Placeholder000000000002",
  "/ip4/203.0.113.12/tcp/4001/p2p/12D3KooWDummyBootstrap3Placeholder000000000003"
]
dns_seeds = [
  "_dnsaddr.dummy-seed-1.mainnet.budlum.example",
  "_dnsaddr.dummy-seed-2.mainnet.budlum.example"
]
# ceremony_status = "pending"  # flip to "frozen" after N-of-M minutes
max_peers = 100
banned_peer_db = "./data/mainnet/banned-peers.json"
mdns_enabled = false

[rpc]
public_listener = "0.0.0.0:8545"
operator_listener = "127.0.0.1:8546"
trusted_proxies = []
enabled = true

[metrics]
listener = "0.0.0.0:9090"

[validator]
backend = "pkcs11"

[validator.signer]
backend = "pkcs11"

# Add a deployment-specific PKCS#11 section outside source control.
# Mainnet validators must expose Ed25519 plus BLS (`BUD_BLS_KEY`) and
# Dilithium/PQ (`BUD_PQ_KEY`) material through the token; Ed25519-only HSM
# backends fail closed at startup.
# [validator.signer.pkcs11]
# module_path = "/path/to/vendor-pkcs11.so"
# slot_id = 0
# token_pin_env = "BUDLUM_PKCS11_TOKEN_PIN"

[features]
governance = false
zkvm_contracts = false
pruning = false
