#  — proto/buf kapı yapılandırması
# Kapsam: buf lint (STANDARD) + buf build + buf breaking --against main (CI'da).
version: v2
modules:
  - path: proto
lint:
  use:
    - STANDARD
  ignore_only:
    # BİLİNÇLİ KALİBRASYONLAR (mevcut wire/semantik durum korunur):
    # (1) Enum'da 0 değeri TRANSFER — _UNSPECIFIED çevirisi default semantiğini
    #     değiştirir (wire sayıları sabit kalsa bile default tx_type sapar).
    # (2) Paket adı budlum.network korunur — .v1 suffix'i message FQN'lerini
    #     değiştirir (= wire breaking). Paket versiyonlama evrimi  borcu.
    # PACKAGE_DIRECTORY_MATCH ise gerçek uyumla çözüldü (dosya taşındı,
    # protoc FQN/paket adı değişmedi → wire etkisiz).
    ENUM_ZERO_VALUE_SUFFIX:
      - proto/budlum/network/protocol.proto
    ENUM_VALUE_PREFIX:
      - proto/budlum/network/protocol.proto
    PACKAGE_VERSION_SUFFIX:
      - proto/budlum/network/protocol.proto
breaking:
  use:
    - FILE
